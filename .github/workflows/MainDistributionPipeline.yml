#
# Primary binary distribution pipeline.
# The current DuckDB line is built here against v1.5.4.
# Minimum-version compatibility for v1.4.0 is validated in CI and packaged in release.yml.
#
name: Main Extension Distribution Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.head_ref || '' }}-${{ github.base_ref || '' }}-${{ github.ref != 'refs/heads/main' || github.sha }}
  cancel-in-progress: true

jobs:
  duckdb-primary-build:
    name: Build extension binaries (DuckDB v1.5.4 primary line)
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5-variegata
    with:
      duckdb_version: v1.5.4
      ci_tools_version: v1.5-variegata
      extension_name: dplyr
      extra_toolchains: rust
